name: Release

on:
  push:
    branches:
      - main
    # Only trigger when pyproject.toml changes (where the version is bumped)
    paths:
      - "pyproject.toml"

jobs:
  release:
    name: Create Release and Publish to PyPI
    runs-on: ubuntu-latest
    
    # These permissions are required for OIDC (PyPI) and creating GitHub Releases
    permissions:
      contents: write
      id-token: write

    # This environment name MUST match what you put in the PyPI form
    environment:
      name: pypi
      url: https://pypi.org/p/whatsmynote

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Get version from pyproject.toml
        id: get_version
        run: |
          VERSION=$(grep -m 1 '^version = ' pyproject.toml | cut -d '"' -f 2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Found version: $VERSION"

      - name: Check if tag exists
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.get_version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag v${{ steps.get_version.outputs.version }} already exists. Skipping release."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag v${{ steps.get_version.outputs.version }} does not exist. Proceeding with release."
          fi

      - name: Create GitHub Release
        if: steps.check_tag.outputs.exists == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="v${{ steps.get_version.outputs.version }}"
          gh release create "$TAG_NAME" \
            --title "Release $TAG_NAME" \
            --generate-notes

      - name: Build package
        if: steps.check_tag.outputs.exists == 'false'
        run: uv build

      - name: Publish to PyPI
        if: steps.check_tag.outputs.exists == 'false'
        uses: pypa/gh-action-pypi-publish@release/v1
